name: 🖥️ WINDOWS DOCKURR (5 MAY - AUTO EDGE + VNC WEB VIP)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-rdp:
    name: "May ao so ${{ matrix.machine }}"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        machine: [1, 2, 3, 4, 5]

    steps:
      - name: 🔧 Xay dung ha tang va Script Auto Fake Info
        run: |
          set -e
          # Bo qua update rườm rà de ep toc do no IP duoi 1 phut
          sudo apt-get update -yqq > /dev/null 2>&1 || true

          # Gieo que ngau nhien cho tung may
          RANDOM_SUFFIX=$(cat /dev/urandom | tr -dc 'A-Z0-9' | fold -w 6 | head -n 1)
          PC_NAME="DESKTOP-$RANDOM_SUFFIX"
          
          RAM_OPTIONS=("8G" "12G" "16G")
          SELECTED_RAM=${RAM_OPTIONS[$[$RANDOM % ${#RAM_OPTIONS[@]}]]}
          
          CPU_OPTIONS=("12th Gen Intel(R) Core(TM) i5-12400F" "13th Gen Intel(R) Core(TM) i7-13700K" "Intel(R) Core(TM) i5-10400F @ 2.90GHz")
          SELECTED_CPU=${CPU_OPTIONS[$[$RANDOM % ${#CPU_OPTIONS[@]}]]}

          sudo mkdir -p /mnt/windows_data
          sudo chmod 777 /mnt/windows_data

          mkdir -p oem
          cat > oem/install.bat <<EOF
          @echo off
          echo ===================================================
          echo [AUTO VIP] DANG KHOI DONG QUY TRINH FAKE INFO VA EDGE
          echo ===================================================
          REG DELETE "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\OEMInformation" /f >nul 2>&1
          powershell -Command "Rename-Computer -NewName '$PC_NAME' -Force"
          REG ADD "HKLM\HARDWARE\DESCRIPTION\System\CentralProcessor\0" /v "ProcessorNameString" /t REG_SZ /d "$SELECTED_CPU" /f >nul 2>&1
          
          :: Nho thay link tai App cua bro vao day nhe!
          echo @echo off > "C:\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp\auto_edge.bat"
          echo start msedge "LINK_APP_CUA_BRO_VAO_DAY" >> "C:\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp\auto_edge.bat"
          
          shutdown /r /t 10
          EOF

          cat > docker-compose.yml <<EOF_D
          version: "3.9"
          services:
            windows:
              image: dockurr/windows
              container_name: windows_rdp
              privileged: true
              environment:
                VERSION: "10"
                USERNAME: "user"
                PASSWORD: "ngoc0102@"
                RAM_SIZE: "$SELECTED_RAM"
                CPU_CORES: "4"
                DISK_SIZE: "128G"
              devices:
                - /dev/kvm
              ports:
                - "3389:3389"
                - "8006:8006"
              volumes:
                - /mnt/windows_data:/storage
                - ./oem:/oem
          EOF_D

          docker compose up -d > /dev/null 2>&1

          wget -q https://github.com/kami2k1/tunnel/releases/latest/download/kami-tunnel-linux-amd64.tar.gz
          tar -xzf kami-tunnel-linux-amd64.tar.gz > /dev/null 2>&1
          chmod +x kami-tunnel

          nohup ./kami-tunnel 3389 > kami_tunnel_rdp.log 2>&1 &
          sleep 3
          nohup ./kami-tunnel 8006 > kami_tunnel_web.log 2>&1 &

      - name: 🌐 LAY LINK VNC WEB VA RDP
        run: |
          RDP_IP=""
          WEB_IP=""
          RETRY=0
          while [ -z "$WEB_IP" ] && [ $RETRY -lt 60 ]; do
            if [ -f kami_tunnel.txt ]; then
              RDP_IP=$(cat kami_tunnel.txt 2>/dev/null | head -1)
              WEB_IP=$(cat kami_tunnel.txt 2>/dev/null | tail -1)
              # Dam bao web ip khong bi trung rdp ip neu file chua ghi xong
              if [ "$WEB_IP" == "$RDP_IP" ]; then WEB_IP=""; fi
            fi
            sleep 2
            RETRY=$((RETRY + 1))
          done

          # Neu lo kami tunnel chi ra 1 dong
          if [ -z "$WEB_IP" ] && [ -n "$RDP_IP" ]; then
            BASE_IP="${RDP_IP%:*}"
            WEB_IP="${BASE_IP}:8006"
          fi

          echo "======================================================================="
          echo "  ✅ MAY SỐ ${{ matrix.machine }} - ĐÃ LÊN ĐẠN!"
          echo "======================================================================="
          echo "  🌍 LINK VNC WEB (XEM LIVE) : http://$WEB_IP"
          echo "  🌐 LINK RDP (APP)          : $RDP_IP"
          echo "  👤 Tai khoan               : user"
          echo "  🔐 Mat khau                : ngoc0102@"
          echo "======================================================================="
          
          for i in {1..72}; do
            sleep 300
            echo "✅ May chu van song ($((i * 5)) phut / 360 phut)"
          done
