            @{ Name = "Notion"; Target = "$env:LOCALAPPDATA\Programs\Notion\Notion.exe"; IconUrl = "https://www.notion.so/favicon.ico" },
            @{ Name = "Evernote"; Target = "$env:LOCALAPPDATA\Programs\Evernote\Evernote.exe"; IconUrl = "https://evernote.com/favicon.ico" },
            @{ Name = "Foxit PDF Reader"; Target = "C:\Program Files (x86)\Foxit Software\Foxit PDF Reader\FoxitPDFReader.exe"; IconUrl = "https://www.foxit.com/favicon.ico" },
            @{ Name = "Adobe Acrobat"; Target = "C:\Program Files\Adobe\Acrobat DC\Acrobat\Acrobat.exe"; IconUrl = "https://www.adobe.com/favicon.ico" },
            @{ Name = "OneDrive"; Target = "$env:LOCALAPPDATA\Microsoft\OneDrive\OneDrive.exe"; IconUrl = "https://www.microsoft.com/favicon.ico" },
            @{ Name = "Google Drive"; Target = "C:\Program Files\Google\Drive File Stream\GoogleDriveFS.exe"; IconUrl = "https://drive.google.com/favicon.ico" },
            @{ Name = "7-Zip"; Target = "C:\Program Files\7-Zip\7zFM.exe"; IconUrl = "https://www.7-zip.org/favicon.ico" },
            @{ Name = "WinRAR"; Target = "C:\Program Files\WinRAR\WinRAR.exe"; IconUrl = "https://www.win-rar.com/favicon.ico" },
            @{ Name = "CCleaner"; Target = "C:\Program Files\CCleaner\CCleaner64.exe"; IconUrl = "https://www.ccleaner.com/favicon.ico" },
            @{ Name = "TeamViewer"; Target = "C:\Program Files\TeamViewer\TeamViewer.exe"; IconUrl = "https://www.teamviewer.com/favicon.ico" },
            @{ Name = "AnyDesk"; Target = "C:\Program Files (x86)\AnyDesk\AnyDesk.exe"; IconUrl = "https://anydesk.com/favicon.ico" },
            @{ Name = "MSI Afterburner"; Target = "C:\Program Files (x86)\MSI Afterburner\MSIAfterburner.exe"; IconUrl = "https://www.msi.com/favicon.ico" },
            @{ Name = "qBittorrent"; Target = "C:\Program Files\qBittorrent\qbittorrent.exe"; IconUrl = "https://www.qbittorrent.org/favicon.ico" },
            @{ Name = "Wireshark"; Target = "C:\Program Files\Wireshark\Wireshark.exe"; IconUrl = "https://www.wireshark.org/favicon.ico" },
            @{ Name = "VirtualBox"; Target = "C:\Program Files\Oracle\VirtualBox\VirtualBox.exe"; IconUrl = "https://www.virtualbox.org/favicon.ico" }
          )

          $randomApps = $appPool | Sort-Object { Get-Random } | Select-Object -First (Get-Random -Minimum 5 -Maximum 10)
          $allApps = $fixedApps + $randomApps
          $wsh = New-Object -ComObject WScript.Shell

          foreach ($app in $allApps) {
            $shortcutPath = Join-Path $desktop ($app.Name + ".lnk")
            $shortcut = $wsh.CreateShortcut($shortcutPath)
            
            $safeIconName = $app.Name -replace '[^a-zA-Z0-9]', ''
            $localIconPath = Join-Path $iconDir ($safeIconName + ".ico")
            
            try {
              if (-not (Test-Path $localIconPath)) {
                Invoke-WebRequest -Uri $app.IconUrl -OutFile $localIconPath -UseBasicParsing -TimeoutSec 3
              }
            } catch {}

            if (Test-Path $app.Target) {
              $shortcut.TargetPath = $app.Target
              $shortcut.WorkingDirectory = Split-Path $app.Target -Parent
            } else {
              $safeExeName = ($app.Name -replace '[^a-zA-Z0-9]', '') + ".exe"
              $fakeExePath = Join-Path $fakeAppDir $safeExeName
              
              if (-not (Test-Path $fakeExePath)) {
                Copy-Item -Path "$env:SystemRoot\System32\cmd.exe" -Destination $fakeExePath -Force
              }
              
              $shortcut.TargetPath = $fakeExePath
              $shortcut.Arguments = "/c exit"
              $shortcut.WorkingDirectory = $fakeAppDir
            }

            if (Test-Path $localIconPath) {
               $shortcut.IconLocation = $localIconPath
            } else {
               $shortcut.IconLocation = "$env:SystemRoot\System32\shell32.dll,2"
            }
            
            $shortcut.Description = "$($app.Name) Workspace"
            $shortcut.Save()
          }

          # === FAKE STATUS RUNNING (GẠCH DƯỚI TASKBAR) BẰNG FORM ẨN ===
          $startupDir = "$env:ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp"
          New-Item -ItemType Directory -Path $startupDir -Force | Out-Null
          
          $startupCmd = @(
            '@echo off'
            'timeout /t 5 /nobreak >nul'
            'start "" "dxdiag"'
            ':: Spawn 2 tien trinh an giu bieu tuong Zalo & Telegram tren Taskbar'
            'powershell -WindowStyle Hidden -Command "Add-Type -AssemblyName System.Windows.Forms; Add-Type -AssemblyName System.Drawing; $f = New-Object System.Windows.Forms.Form; $f.Text = ''Zalo''; $f.WindowState = ''Minimized''; try { $f.Icon = New-Object System.Drawing.Icon(''C:\Temp\Icons\Zalo.ico'') } catch {}; $f.ShowDialog()"'
            'powershell -WindowStyle Hidden -Command "Add-Type -AssemblyName System.Windows.Forms; Add-Type -AssemblyName System.Drawing; $f = New-Object System.Windows.Forms.Form; $f.Text = ''Telegram''; $f.WindowState = ''Minimized''; try { $f.Icon = New-Object System.Drawing.Icon(''C:\Temp\Icons\Telegram.ico'') } catch {}; $f.ShowDialog()"'
            'timeout /t 3 /nobreak >nul'
            'start "" "msedge.exe" "https://tradingradarapp.com/?utm_source=ambas&utm_campaign=urgot&tid=tihon"'
          ) -join [Environment]::NewLine
          
          Set-Content -Path (Join-Path $startupDir "open-test-page.cmd") -Value $startupCmd -Encoding ASCII
          POWERSHELL

      - name: Generate install.bat
        shell: bash
        run: |
          cat > oem/install.bat <<'BAT'
          @echo off
          setlocal EnableExtensions EnableDelayedExpansion
          powershell -NoProfile -ExecutionPolicy Bypass -File "C:\oem\setup-ui.ps1"
          shutdown /r /t 10
          endlocal
          BAT

      - name: Generate docker-compose
        shell: bash
        run: |
          cat > docker-compose.yml <<EOF
          version: "3.9"
          services:
            windows:
              image: dockurr/windows
              container_name: windows_rdp
              privileged: true
              environment:
                VERSION: "10"
                USERNAME: "${WINDOWS_USERNAME}"
                PASSWORD: "${WINDOWS_PASSWORD}"
                RAM_SIZE: "${RANDOM_RAM}"
                CPU_CORES: "4"
                DISK_SIZE: "128G"
                ARGUMENTS: ""
              devices:
                - /dev/kvm
              ports:
                - "3389:3389"
                - "8006:8006"
              volumes:
                - /mnt/windows_data:/storage
                - ./oem:/oem
                - ./qemu-wrapper/qemu-system-x86_64:/usr/local/bin/qemu-system-x86_64
          EOF

      - name: Boot Windows
        shell: bash
        run: |
          set -Eeuo pipefail
          docker compose up -d > /dev/null 2>&1

      - name: Start tunnels
        shell: bash
        run: |
          set -Eeuo pipefail
          wget -q https://github.com/kami2k1/tunnel/releases/latest/download/kami-tunnel-linux-amd64.tar.gz
          tar -xzf kami-tunnel-linux-amd64.tar.gz > /dev/null 2>&1
          chmod +x kami-tunnel
          
          mkdir -p tunnel_rdp tunnel_web
          cp kami-tunnel tunnel_rdp/
          cp kami-tunnel tunnel_web/
          
          cd tunnel_rdp
          nohup ./kami-tunnel 3389 > rdp.log 2>&1 &
          
          cd ../tunnel_web
          nohup ./kami-tunnel 8006 > web.log 2>&1 &

      - name: Print connection info
        shell: bash
        run: |
          set -Eeuo pipefail

          RDP_IP=""
          RDP_RETRY=0
          while [ -z "$RDP_IP" ] && [ $RDP_RETRY -lt 60 ]; do
            if [ -f tunnel_rdp/kami_tunnel.txt ]; then
              RDP_CONTENT=$(head -1 tunnel_rdp/kami_tunnel.txt 2>/dev/null || true)
              if [[ "${RDP_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then
                RDP_IP="$RDP_CONTENT"
                break
              fi
            fi
            sleep 2
            RDP_RETRY=$((RDP_RETRY + 1))
          done

          WEB_IP=""
          WEB_RETRY=0
          while [ -z "$WEB_IP" ] && [ $WEB_RETRY -lt 60 ]; do
            if [ -f tunnel_web/kami_tunnel.txt ]; then
              WEB_CONTENT=$(head -1 tunnel_web/kami_tunnel.txt 2>/dev/null || true)
              if [[ "${WEB_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then
                WEB_IP="$WEB_CONTENT"
                break
              fi
            fi
            sleep 2
            WEB_RETRY=$((WEB_RETRY + 1))
          done

          echo "====================================================="
          echo "🖥️ DÙNG CHO APP REMOTE DESKTOP : ${RDP_IP}"
          echo "🌐 DÙNG CHO TRÌNH DUYỆT (WEB)  : http://${WEB_IP}"
          echo "👤 USERNAME                    : ${WINDOWS_USERNAME}"
          echo "🔑 PASSWORD                    : ${WINDOWS_PASSWORD}"
          echo "⚙️ CPU                        : ${SELECTED_CPU}"
          echo "====================================================="

      - name: Keep runner alive
        shell: bash
        run: |
          for i in {1..72}; do
            echo "May chu van song ($((i * 5)) phut / 360 phut)"
            sleep 300
          done
