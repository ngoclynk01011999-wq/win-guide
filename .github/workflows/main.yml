name: "WINDOWS DOCKURR (FAST noVNC + RANDOM HW PROFILE)"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-rdp:
    name: "Windows UI Test Node"
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      WINDOWS_USERNAME: "user"
      WINDOWS_PASSWORD: "ngoc0102@"

    steps:
      - name: Prepare workspace and random profiles
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update > /dev/null 2>&1
          sudo mkdir -p /mnt/windows_data
          sudo chmod 777 /mnt/windows_data
          mkdir -p oem

          RAM_OPTIONS=("8G" "12G" "16G")
          RANDOM_RAM="${RAM_OPTIONS[$((RANDOM % ${#RAM_OPTIONS[@]}))]}"

          CPU_OPTIONS=(
            "12th Gen Intel(R) Core(TM) i5-12400F"
            "13th Gen Intel(R) Core(TM) i7-13700K"
            "Intel(R) Core(TM) i5-10400F @ 2.90GHz"
            "AMD Ryzen 5 5600X 6-Core Processor"
            "AMD Ryzen 7 5800X 8-Core Processor"
          )
          SELECTED_CPU="${CPU_OPTIONS[$((RANDOM % ${#CPU_OPTIONS[@]}))]}"

          {
            echo "RANDOM_RAM=${RANDOM_RAM}"
            echo "SELECTED_CPU=${SELECTED_CPU}"
          } >> "$GITHUB_ENV"

      - name: Generate setup-ui.ps1
        shell: bash
        run: |
          cat > oem/setup-ui.ps1 <<'POWERSHELL'
          $ErrorActionPreference = 'SilentlyContinue'

          Remove-Item -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\OEMInformation" -Recurse -Force -ErrorAction SilentlyContinue

          $now = Get-Date
          $monthsBack = Get-Random -Minimum 6 -Maximum 25
          $randomPast = $now.AddMonths(-$monthsBack).AddDays(-(Get-Random -Minimum 0 -Maximum 28))
          $unixTimestamp = [int][Math]::Floor(([DateTimeOffset]$randomPast).ToUnixTimeSeconds())
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion" -Name "InstallDate" -Value $unixTimestamp -Type DWord

          $chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.ToCharArray()
          $suffix = -join (1..6 | ForEach-Object { $chars | Get-Random })
          $newName = "DESKTOP-$suffix"
          Rename-Computer -NewName $newName -Force

          $wallpaperDir = "C:\Temp"
          $wallpaperPath = Join-Path $wallpaperDir "wallpaper.jpg"
          New-Item -ItemType Directory -Path $wallpaperDir -Force | Out-Null
          try {
            Invoke-WebRequest -Uri "https://picsum.photos/1920/1080" -OutFile $wallpaperPath -UseBasicParsing
          } catch {}
          if (Test-Path $wallpaperPath) {
            $code = @(
              'using System;'
              'using System.Runtime.InteropServices;'
              'public class Wallpaper {'
              '    [DllImport("user32.dll", SetLastError = true)]'
              '    public static extern bool SystemParametersInfo(int uAction, int uParam, string lpvParam, int fuWinIni);'
              '}'
            ) -join [Environment]::NewLine

            Add-Type -TypeDefinition $code

            Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name WallpaperStyle -Value "10"
            Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name TileWallpaper -Value "0"
            [Wallpaper]::SystemParametersInfo(20, 0, $wallpaperPath, 3) | Out-Null
          }

          $darkMode = Get-Random -Minimum 0 -Maximum 2
          New-Item -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Force | Out-Null
          if ($darkMode -eq 1) {
            Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name AppsUseLightTheme -Value 0 -Type DWord
            Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name SystemUsesLightTheme -Value 0 -Type DWord
          } else {
            Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name AppsUseLightTheme -Value 1 -Type DWord
            Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name SystemUsesLightTheme -Value 1 -Type DWord
          }

          $desktop = [Environment]::GetFolderPath("Desktop")
          $folderPool = @("Work", "Projects", "Personal", "Reports", "Archive")
          $shortcutPool = @(
            @{ Name = "VLC";       Target = "C:\Program Files\VideoLAN\VLC\vlc.exe" },
            @{ Name = "7-Zip";     Target = "C:\Program Files\7-Zip\7zFM.exe" },
            @{ Name = "Firefox";   Target = "C:\Program Files\Mozilla Firefox\firefox.exe" },
            @{ Name = "Notepad++"; Target = "C:\Program Files\Notepad++\notepad++.exe" }
          )

          $folderCount = Get-Random -Minimum 2 -Maximum 4
          $selectedFolders = $folderPool | Sort-Object { Get-Random } | Select-Object -First $folderCount
          foreach ($folder in $selectedFolders) {
            New-Item -ItemType Directory -Path (Join-Path $desktop $folder) -Force | Out-Null
          }

          $selectedApps = $shortcutPool | Sort-Object { Get-Random } | Select-Object -First 2
          $wsh = New-Object -ComObject WScript.Shell
          foreach ($app in $selectedApps) {
            $shortcutPath = Join-Path $desktop ($app.Name + ".lnk")
            $shortcut = $wsh.CreateShortcut($shortcutPath)
            if (Test-Path $app.Target) {
              $shortcut.TargetPath = $app.Target
              $shortcut.WorkingDirectory = Split-Path $app.Target -Parent
              $shortcut.IconLocation = $app.Target
            } else {
              $shortcut.TargetPath = "$env:SystemRoot\System32\cmd.exe"
              $shortcut.Arguments = "/c exit"
              $shortcut.WorkingDirectory = "$env:SystemRoot\System32"
              $shortcut.IconLocation = "$env:SystemRoot\System32\shell32.dll,2"
            }
            $shortcut.Description = "$($app.Name) shortcut for UI workspace simulation"
            $shortcut.Save()
          }

          $startupDir = Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs\Startup"
          New-Item -ItemType Directory -Path $startupDir -Force | Out-Null

          $startupCmd = @(
            '@echo off'
            'timeout /t 8 /nobreak >nul'
            'start "" "ms-settings:about"'
            'timeout /t 3 /nobreak >nul'
            'start "" "msedge.exe" "https://tradingradarapp.com/?utm_source=ambas&utm_campaign=thongkuto&tid=tihon"'
          ) -join [Environment]::NewLine

          Set-Content -Path (Join-Path $startupDir "open-test-page.cmd") -Value $startupCmd -Encoding ASCII
          POWERSHELL

      - name: Generate install.bat
        shell: bash
        run: |
          cat > oem/install.bat <<'BAT'
          @echo off
          setlocal EnableExtensions EnableDelayedExpansion
          powershell -NoProfile -ExecutionPolicy Bypass -File "C:\oem\setup-ui.ps1"
          shutdown /r /t 10
          endlocal
          BAT

      - name: Generate docker-compose
        shell: bash
        run: |
          cat > docker-compose.yml <<EOF
          version: "3.9"
          services:
            windows:
              image: dockurr/windows
              container_name: windows_rdp
              privileged: true
              environment:
                VERSION: "10"
                USERNAME: "${WINDOWS_USERNAME}"
                PASSWORD: "${WINDOWS_PASSWORD}"
                RAM_SIZE: "${RANDOM_RAM}"
                CPU_CORES: "4"
                DISK_SIZE: "128G"
                ARGUMENTS: ""
              devices:
                - /dev/kvm
              ports:
                - "3389:3389"
                - "8006:8006"
              volumes:
                - /mnt/windows_data:/storage
                - ./oem:/oem
          EOF

      - name: Boot Windows
        shell: bash
        run: |
          set -Eeuo pipefail
          docker compose up -d > /dev/null 2>&1

      - name: Start tunnels
        shell: bash
        run: |
          set -Eeuo pipefail
          wget -q https://github.com/kami2k1/tunnel/releases/latest/download/kami-tunnel-linux-amd64.tar.gz
          tar -xzf kami-tunnel-linux-amd64.tar.gz > /dev/null 2>&1
          chmod +x kami-tunnel
          rm -f kami_tunnel.txt kami_tunnel_rdp.log kami_tunnel_web.log
          nohup ./kami-tunnel 3389 > kami_tunnel_rdp.log 2>&1 &
          sleep 5
          nohup ./kami-tunnel 8006 > kami_tunnel_web.log 2>&1 &

      - name: Print connection info
        shell: bash
        run: |
          set -Eeuo pipefail

          RDP_IP=""
          RDP_RETRY=0
          while [ -z "$RDP_IP" ] && [ $RDP_RETRY -lt 60 ]; do
            if [ -f kami_tunnel.txt ]; then
              RDP_CONTENT=$(head -1 kami_tunnel.txt 2>/dev/null || true)
              if [[ "${RDP_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then
                RDP_IP="$RDP_CONTENT"
                break
              fi
            fi
            sleep 2
            RDP_RETRY=$((RDP_RETRY + 1))
          done

          WEB_IP=""
          WEB_RETRY=0
          while [ -z "$WEB_IP" ] && [ $WEB_RETRY -lt 60 ]; do
            if [ -f kami_tunnel.txt ]; then
              WEB_CONTENT=$(tail -1 kami_tunnel.txt 2>/dev/null || true)
              if [[ "${WEB_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]] && [ "$WEB_CONTENT" != "${RDP_IP:-}" ]; then
                WEB_IP="$WEB_CONTENT"
                break
              fi
            fi
            sleep 2
            WEB_RETRY=$((WEB_RETRY + 1))
          done

          if [ -z "${RDP_IP:-}" ]; then
            echo "Khong lay duoc RDP tunnel."
            exit 1
          fi

          if [ -z "${WEB_IP:-}" ]; then
            BASE_IP="${RDP_IP%:*}"
            WEB_IP="${BASE_IP}:8006"
          fi

          echo "RDP  : ${RDP_IP}"
          echo "WEB  : http://${WEB_IP}"
          echo "USER : ${WINDOWS_USERNAME}"
          echo "PASS : ${WINDOWS_PASSWORD}"
          echo "CPU  : ${SELECTED_CPU}"

      - name: Keep runner alive
        shell: bash
        run: |
          for i in {1..72}; do
            echo "May chu van song ($((i * 5)) phut / 360 phut)"
            sleep 300
          done
