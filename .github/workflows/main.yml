name: 🖥️ WINDOWS DOCKURR (UI TEST NODE - RANDOM HW PROFILE)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-rdp:
    name: "Windows UI Test Node"
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        machine: [1, 2, 3, 4, 5]

    steps:
      - name: 🔧 Xay dung ha tang va Script Auto
        run: |
          set -e
          sudo apt-get update > /dev/null 2>&1

          echo "Dang mo khoa o cung cua GitHub..."
          sudo mkdir -p /mnt/windows_data
          sudo chmod 777 /mnt/windows_data

          echo "Dang chon cau hinh RAM ngau nhien..."
          RAM_OPTIONS=("8G" "12G" "16G")
          RANDOM_RAM="${RAM_OPTIONS[$((RANDOM % ${#RAM_OPTIONS[@]}))]}"
          echo "RAM_SIZE duoc chon: ${RANDOM_RAM}"

          echo "Dang tao script khoi tao Windows sach (oem/install.bat)..."
          mkdir -p oem
          cat > oem/install.bat <<'BAT'
          @echo off
          setlocal EnableExtensions EnableDelayedExpansion

          echo ===================================================
          echo [UI TEST] DANG KHOI TAO MOI TRUONG WINDOWS
          echo ===================================================

          echo [1/5] Dang lam sach thong tin OEM...
          REG DELETE "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\OEMInformation" /f >nul 2>&1

          echo [2/5] Dang mo phong CPU...
          set "CPU_0=12th Gen Intel(R) Core(TM) i5-12400F"
          set "CPU_1=13th Gen Intel(R) Core(TM) i7-13700K"
          set "CPU_2=Intel(R) Core(TM) i5-10400F @ 2.90GHz"
          set /a CPU_INDEX=%RANDOM% %% 3
          call set "SELECTED_CPU=%%CPU_!CPU_INDEX!%%"

          REG ADD "HKLM\HARDWARE\DESCRIPTION\System\CentralProcessor\0" ^
            /v ProcessorNameString /t REG_SZ /d "!SELECTED_CPU!" /f >nul

          echo CPU duoc gan: !SELECTED_CPU!

          echo [3/5] Dang sinh hostname ngau nhien...
          powershell -NoProfile -ExecutionPolicy Bypass -Command ^
            "$chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.ToCharArray(); " ^
            "$suffix = -join (1..6 | ForEach-Object { $chars | Get-Random }); " ^
            "$newName = 'DESKTOP-' + $suffix; " ^
            "Write-Host ('Hostname moi: ' + $newName); " ^
            "Rename-Computer -NewName $newName -Force"

          echo [4/5] Dang tao Startup script mo trang test...
          set "STARTUP_DIR=%APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup"
          if not exist "%STARTUP_DIR%" mkdir "%STARTUP_DIR%"

          > "%STARTUP_DIR%\open-test-page.cmd" echo @echo off
          >> "%STARTUP_DIR%\open-test-page.cmd" echo timeout /t 8 /nobreak ^>nul
          >> "%STARTUP_DIR%\open-test-page.cmd" echo start "" "msedge.exe" "https://example.com/test-page"

          echo [5/5] Hoan tat. Chuan bi khoi dong lai de ap dung ten may moi...
          shutdown /r /t 10

          endlocal
          BAT

          echo "Dang xay dung may chu Windows RDP..."
          cat > docker-compose.yml <<EOF
          version: "3.9"

          services:
            windows:
              image: dockurr/windows
              container_name: windows_rdp
              privileged: true
              environment:
                VERSION: "10"
                USERNAME: "user"
                PASSWORD: "ngoc0102@"
                RAM_SIZE: "${RANDOM_RAM}"
                CPU_CORES: "4"
                DISK_SIZE: "128G"
              devices:
                - /dev/kvm
              ports:
                - "3389:3389"
                - "8006:8006"
              volumes:
                - /mnt/windows_data:/storage
                - ./oem:/oem
          EOF

          echo "Kich hoat Docker ngam..."
          docker compose up -d > /dev/null 2>&1

          echo "Tai va mo duong ham Kami Tunnel..."
          wget -q https://github.com/kami2k1/tunnel/releases/latest/download/kami-tunnel-linux-amd64.tar.gz
          tar -xzf kami-tunnel-linux-amd64.tar.gz > /dev/null 2>&1
          chmod +x kami-tunnel

          nohup ./kami-tunnel 3389 > kami_tunnel_rdp.log 2>&1 &
          sleep 5
          nohup ./kami-tunnel 8006 > kami_tunnel_web.log 2>&1 &

      - name: 🌐 LAY THONG TIN KET NOI RDP
        run: |
          echo "Dang lay IP duong ham..."
          echo ""

          RDP_IP=""
          RDP_RETRY=0
          while [ -z "$RDP_IP" ] && [ $RDP_RETRY -lt 60 ]; do
            if [ -f kami_tunnel.txt ]; then
              RDP_CONTENT=$(cat kami_tunnel.txt 2>/dev/null | head -1)
              if [[ "$RDP_CONTENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then
                RDP_IP="$RDP_CONTENT"
                break
              fi
            fi
            sleep 2
            RDP_RETRY=$((RDP_RETRY + 1))
          done

          WEB_IP=""
          WEB_RETRY=0
          while [ -z "$WEB_IP" ] && [ $WEB_RETRY -lt 60 ]; do
            if [ -f kami_tunnel.txt ]; then
              WEB_CONTENT=$(cat kami_tunnel.txt 2>/dev/null | tail -1)
              if [[ "$WEB_CONTENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]] && [ "$WEB_CONTENT" != "$RDP_IP" ]; then
                WEB_IP="$WEB_CONTENT"
                break
              fi
            fi
            sleep 2
            WEB_RETRY=$((WEB_RETRY + 1))
          done

          if [ -z "$WEB_IP" ] && [ -n "$RDP_IP" ]; then
            BASE_IP="${RDP_IP%:*}"
            WEB_IP="${BASE_IP}:8006"
          fi

          echo "======================================================================="
          echo "  ✅ WINDOWS 10 PRO (UI TEST NODE) - DA SAN SANG SU DUNG"
          echo "======================================================================="
          echo "  🌐  Ket noi RDP    : $RDP_IP"
          echo "  👤  Tai khoan      : user"
          echo "  🔐  Mat khau       : ngoc0102@"
          echo "  🌍  Xem tren Web   : http://$WEB_IP"
          echo "======================================================================="
          echo "Dang duy tri may chu 6 tieng..."
          for i in {1..72}; do
            ELAPSED=$((i * 5))
            REMAINING=$((360 - ELAPSED))
            echo "✅ May chu van song ($ELAPSED phut / 360 phut)"
            sleep 300
          done
